body: |
  # 0011. Transform shim CLI surface and per-tool output defaults

  ## Context and Problem Statement

  The transform shim gives pinned access to bundled tools so emitted scripts call dovetail's vendored binaries (choice 0006). There is an asymmetry: jaq has its own program language, so `dovetail jaq` is genuine passthrough; calamine and calcard are libraries with no native CLI, so dovetail must define a thin, stable command surface over each. The exact surface and per-tool output defaults need pinning. This is open as to surface detail, not principle.

  ## Considered Options

  - **`dovetail jaq <program> <file>`** — true passthrough to embedded jaq; the reviewer reads the actual jq program. Candidate default output: NDJSON.
  - **`dovetail calamine <file> [--sheet N]`** — dovetail-authored CLI over the calamine library (Excel). Candidate default output: Parquet.
  - **`dovetail calcard <file>`** — dovetail-authored CLI over calcard (.ics / .vcf to JSON, via JSCalendar / JSContact).
  - **Per-tool output defaults** — NDJSON vs Parquet — and flag naming for the library-backed tools.

  ## Decision Outcome

  Open — surface detail, pending `/orb:design`. The principle is settled (passthrough for jaq, a thin stable CLI for the library-backed tools); only the exact flags and output defaults remain.
