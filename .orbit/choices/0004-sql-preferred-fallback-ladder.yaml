body: |
  # 0004. SQL-preferred fallback ladder for emitted output

  ## Context and Problem Statement

  DuckDB ingests most formats natively, but some inputs need a pre-processing step (a jaq conversion, an .ics parse, a dedupe). dovetail must choose the least-invasive emitted output and keep it legible. Note that arcform always needs at least a minimal `.yaml` to run a step, so "SQL-only" is never literally exclusive — the choice is about which output is *preferred*, not which is permitted.

  ## Considered Options

  - **Always emit an arcform `.yaml`,** even for pure-SQL loads. Uniform output, but a needless dependency and wrapper for the common case.
  - **Always embed every load in a single SQL file.** Forces awkward inputs through SQL gymnastics, or fails outright on an unavoidable non-SQL step.
  - **SQL-preferred fallback ladder.** Prefer a standalone `.sql` where DuckDB can do the whole load; emit an arcform `.yaml` only when a non-SQL step is unavoidable.

  ## Decision Outcome

  Chosen option: **the SQL-preferred fallback ladder**.

  1. If the entire load is expressible in DuckDB SQL (`read_json` / `read_csv` with the right parameters, `UNNEST`, `json_extract`), emit a standalone `.sql` — portable, runs anywhere DuckDB does, no other dependency.
  2. If a non-SQL step is unavoidable, emit an arcform `.yaml` that sequences "convert, then load", carrying the transform program as an auditable step.

  `survey` reports which rung it chose and why. "Preferred", not "first": the `.yaml` rung still exists and is exactly where dovetail hands off to arcform (choice 0001).

  ### Consequences

  - Good, because the common case stays a single portable artefact with zero extra dependencies
  - Good, because the line moves on its own — as DuckDB gains readers for a format, that case graduates from the `.yaml` rung to the `.sql` rung with no change to the rule
  - Good, because the `.yaml` rung is the natural seam to arcform
  - Bad, because there are two emitted output shapes to support and test
