body: |
  # 0005. Embedded pinned jaq by default; system jq optional for reference parity

  ## Context and Problem Statement

  dovetail's transform layer (JSON / YAML / TOML / XML conversions) needs an engine. DuckDB is already an expected dependency, so the no-system-dependencies line is crossed. The real question is which dependencies the transform layer should carry: a system jq the user must install, or a vendored engine compiled in.

  ## Considered Options

  - **System jq as the default.** The canonical implementation, but a system dependency whose version varies per environment — a floor, not a guarantee.
  - **Embedded, pinned jaq compiled into dovetail, with optional `--engine jq` for reference parity.**

  ## Decision Outcome

  Chosen option: **vendored jaq compiled into dovetail**, pinned by `Cargo.lock` and travelling with the build — determinism by construction, nothing for the user to install. The same recorded program can run through canonical system jq via `--engine jq` for anyone verifying against the reference implementation; that is a verification path, not the default. jq becomes an *optional* dependency, and its resolved version is recorded in the run manifest so parity is reproducible across environments.

  ### Consequences

  - Good, because the common path is reproducible and joyful — no system dependency for transforms
  - Good, because reference parity is available on demand without weighing down the default
  - Good, because it upholds discovery-to-execution parity (choice 0006): the embedded binary is what emitted scripts call
  - Bad, because dovetail carries jaq in its build and owns its pinning
  - Neutral, because the no-system-dependencies line was already crossed by DuckDB; this decides only the transform layer
