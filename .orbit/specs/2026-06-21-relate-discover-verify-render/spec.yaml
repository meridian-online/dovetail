id: 2026-06-21-relate-discover-verify-render
goal: |
  dovetail relate over a loaded DuckDB discovers candidate foreign-key edges,
  scores each with its evidence, VERIFIES each against the data, writes them as
  Frictionless foreignKeys with auto-assigned status, and compiles accepted edges
  to constraint DDL — best model, no analyst toil.

  ## What good looks like
  An analyst points relate at a DuckDB they loaded (via survey's emitted .sql)
  and gets back a relationship model where the obvious, provable edges are
  already accepted and rendered — no per-edge adjudication queue — and only the
  genuinely uncertain edges are surfaced for an optional look.

  ## The reframe driving this spec
  The brief framed relationship discovery as human-curated. The author's steer:
  give the best model WITHOUT making the analyst do the work. The lever is
  verification — relate already has to query the data, so it can check whether an
  edge actually holds. A VERIFIED high-confidence edge is not a guess, so it can
  auto-accept safely. This refines choice 0007: 'accepted' is reached by
  verification, not only by manual review. The safety intent is unchanged — no
  UNVERIFIED guess becomes a hard constraint.

  ## Constraints
  - The seam (choice 0009): relate READS an existing DuckDB the analyst loaded.
    dovetail runs NO load step; relate issues only read queries (evidence +
    verification). Keeps choice 0001 (emit-don't-execute) clean — querying for
    discovery is not running a pipeline.
  - foreignKeys are canonical (choice 0003) and live INSIDE each resource's Table
    Schema in the Data Package descriptor, shaped {fields, reference:{resource,
    fields}}, with dovetail's evidence/confidence/status as custom properties.
  - Only ACCEPTED edges compile to constraint DDL (choice 0007).
  - Scope: core evidence (value overlap, cardinality, name similarity) + verify +
    constraint-DDL render. finetype semantic-type evidence and the Mermaid /
    join-SQL / brightfield renders are OUT OF SCOPE (their own specs, choice 0010).

  ## Implementation notes
  - "Verified" must be more than zero-orphans: a boolean column has zero orphans
    against another boolean. The verification gate REQUIRES the parent side to be
    unique/PK-like (a real FK references a key). This is the primary kill
    condition — get it right or auto-accept overcalls coincidental overlaps.
  - Verify on FULL columns, not samples — a sampled overlap can miss true
    membership and mis-verify.
  - duckdb becomes a real (non-dev) dependency of dovetail-core for relate's read
    queries. Boundary: read-for-discovery, not pipeline execution (choice 0001).
  - Extends the datapackage module from the survey spec; FKs attach to the
    resource Table Schema.
  - Tabletop: .orbit/specs/2026-06-21-relate-discover-verify-render/tabletop.md
