body: |
  # 0001. dovetail decides; arcform and DuckDB execute

  ## Context and Problem Statement

  dovetail sits in the modelling stage, between finetype (understanding) and arcform (execution). A planner that discovers how to load and relate unfamiliar data could either run the pipelines it discovers, or emit recipes for another engine to run. The temptation during discovery is to "just load it" in-process.

  ## Considered Options

  - **Execute pipelines in-process.** dovetail loads, transforms, and relates data directly, becoming a lightweight pipeline engine.
  - **Emit recipes only.** dovetail discovers load and relationship recipes and hands them to arcform / DuckDB to run; it never executes a pipeline itself.

  ## Decision Outcome

  Chosen option: **emit recipes only**. dovetail decides; arcform and DuckDB execute. The moment work becomes analytical transformation rather than ingestion, it belongs to arcform. This keeps the package a compiler with a small, auditable surface and avoids a second pipeline engine competing with arcform. dovetail's CI role is bounded to reproducible ingestion — getting awkward inputs into clean tables, deterministically.

  ### Consequences

  - Good, because it holds a clean stage boundary: dovetail stays a planner, arcform stays the executor
  - Good, because every output is a reviewable artefact in version control, not a side effect
  - Bad, because an analyst must run the emitted load between survey and relate (see choice 0012's sibling, the survey-relate seam, choice 0009)
  - Neutral, because a scratch-DuckDB convenience that runs dovetail's *own* emitted SQL is still on the table (choice 0009) without breaching this rule
