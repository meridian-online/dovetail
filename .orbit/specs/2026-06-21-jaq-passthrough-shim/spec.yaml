id: 2026-06-21-jaq-passthrough-shim
goal: |
  dovetail jaq <program> <file> runs a jq program through embedded, vendored jaq
  and emits NDJSON by default — true passthrough, byte-stable, with the resolved
  jaq version stamped.

  ## What good looks like
  An analyst (or an emitted script) calls dovetail's own pinned jaq instead of
  whatever jq is on PATH, and gets the same bytes every time. A reviewer reads
  the actual jq program, unrewritten. jaq is the parity keystone — it covers the
  JSON/YAML/TOML/XML conversions and the NDJSON hoist that survey's deferred
  .yaml escalation rung will later call.

  ## The reframe that drives the verification
  There are TWO parity claims, and they need different tests:
  - Self-parity (choice 0006): the embedded jaq in discovery IS the embedded jaq
    emitted scripts call — same vendored binary, byte-identical to itself by
    construction. Verified by reproducibility (ac-05).
  - Reference parity (choice 0005, --engine jq): embedded jaq matches canonical
    jq. jaq is a REIMPLEMENTATION with documented divergences, so this is a
    SCOPED claim — verified against a curated jaq/jq-equivalent corpus, not the
    whole jq language (ac-06), with divergences documented not chased (ac-07).

  ## Constraints
  - jaq only. calamine (Excel) and calcard (ics/vcf) are confirmed in principle
    (choice 0011) but OUT OF SCOPE here — their own spec.
  - True passthrough: the jq program is never rewritten or normalised before the
    reviewer sees it. The emitted/echoed program is byte-equal to the input
    program. Legibility is the output value.
  - Embedded + pinned: jaq is vendored and version-locked via Cargo.lock; no
    system jq on the default path. --engine jq is the optional reference path.
  - The parity corpus is curated to jaq/jq-equivalent ingestion idioms
    (.results[], select, map, hoist); excluded constructs are documented with a
    reason, never silently dropped.

  ## Implementation notes
  - Embedding API: confirm jaq-core/jaq-interpret exposes raw-program passthrough.
    If it forces an AST round-trip that normalises the program, preserve the raw
    program string alongside execution and emit it verbatim (Q10 secondary pivot).
  - ac-06 needs jq on the test machine; gate it to skip-with-notice when absent so
    CI stays dependency-free.
  - Future seam: survey's deferred .yaml escalation rung will emit steps calling
    dovetail jaq ...; no code coupling in this spec, but keep the CLI surface
    stable for that caller.
  - Tabletop: .orbit/specs/2026-06-21-jaq-passthrough-shim/tabletop.md
cards:
- 0003-transform-shim
status: open
labels:
- transform-shim
- jaq
- parity
- passthrough
acceptance_criteria:
- id: ac-01
  description: |
    EMBEDDED JAQ WIRED. dovetail-core gains a transform module that runs a jq
    program over an input through embedded, vendored jaq (jaq-core / jaq-interpret
    / jaq-std as the embedding API requires), pinned in Cargo.lock. No system jq
    on this path. DELIVERABLE: a core function that takes (program, input bytes)
    and returns the jaq result. verifies: capability.
  gate: false
  checked: true
- id: ac-02
  description: |
    PASSTHROUGH IS BYTE-EQUAL (gate). The jq program dovetail runs is byte-equal
    to the program passed in — no rewrite, no normalisation, no reformat. Asserted
    directly: the program dovetail exposes/echoes for review equals the input
    program byte-for-byte. This is the legibility guarantee and gates the rest
    (a rewriting shim fails the whole premise). verifies: capability.
  gate: true
  checked: true
- id: ac-03
  description: |
    CLI SURFACE: dovetail jaq <program> <file>. The thin bin gains a jaq
    subcommand (alongside survey) that runs the program over the file and writes
    NDJSON to stdout by default, exit 0 on success. verifies: capability.
  gate: false
  checked: true
- id: ac-04
  description: |
    NDJSON DEFAULT OUTPUT. Output is newline-delimited JSON by default — one
    JSON value per line, greppable and DuckDB-loadable — over a corpus of jq
    programs and fixture inputs (JSON, plus at least one of YAML/TOML/XML to
    exercise jaq's multi-format input). verifies: capability.
  gate: false
  checked: true
- id: ac-05
  description: |
    REPRODUCIBILITY (self-parity). For each (program, input) in the corpus, two
    runs of dovetail jaq produce byte-identical output. This is the structural
    discovery-execution parity claim (choice 0006): same vendored engine, same
    bytes every time. verifies: capability.
  gate: false
  checked: true
- id: ac-06
  description: |
    REFERENCE PARITY ON THE EQUIVALENT SUBSET. For every program in the curated
    jaq/jq-equivalent corpus (.results[], select, map, hoist and the common
    ingestion idioms), embedded jaq's output is byte-identical to canonical
    system jq's output (the --engine jq reference path, choice 0005). When jq is
    absent from the test machine the check skips with an explicit notice rather
    than failing. verifies: capability.
  gate: false
  checked: true
- id: ac-07
  description: |
    DOCUMENTED-DIVERGENCE LIST. Any jq construct excluded from the parity subset
    because embedded jaq and canonical jq diverge is recorded in a divergence
    note in the spec folder, each entry naming the construct and the reason. The
    parity claim is explicitly "equivalent on this stated subset", not "equivalent
    to jq". verifies: capability.
  gate: false
  checked: true
  ac_type: doc
- id: ac-08
  description: |
    JAQ VERSION STAMPED. The resolved embedded jaq version is retrievable (e.g.
    dovetail jaq --version or a stamp in the run output) so emitted artifacts can
    record what produced them. Keep the stamp shape compatible with choice 0013
    (provenance header). verifies: capability.
  gate: false
  checked: true
