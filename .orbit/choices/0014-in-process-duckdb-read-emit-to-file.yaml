id: '0014'
title: Read and query DuckDB in-process via the Rust crate; emit artifacts to file
status: accepted
date_created: 2026-06-21
date_modified: 2026-06-21
body: |
  # 0014. Read and query DuckDB in-process via the Rust crate; emit artifacts to file

  ## Context and Problem Statement

  dovetail needs DuckDB access for discovery — survey's round-trip checks and,
  especially, relate's many small read queries (value overlap, cardinality,
  referential-integrity verification). How should it reach DuckDB?

  The meridian precedent points one way: **both siblings shell out to an engine
  CLI.** finetype requires the `duckdb` CLI on PATH and routes ingestion through
  `Command::new("duckdb")` (its choice 0100 — "the CLI never linked DuckDB",
  chosen for no-link-risk and the single-binary story). arcform delegates
  execution to engine CLIs to stay engine-agnostic (its decision 0003). The
  dovetail brief's line "DuckDB via the Rust `duckdb` crate, consistent with
  finetype" is therefore inaccurate to finetype's actual shipped decision — finetype
  shells out, it does not embed.

  So this is a genuine fork, and the brief's "consistent" framing does not settle it.

  ## Considered Options

  - **Shell out to the `duckdb` CLI** (the sibling convention). Consistent across
    meridian, no bundled-libduckdb compile, preserves a single-binary story. But
    subprocess-per-query is awkward for relate's iterative many-small-queries
    pattern; the engine version is a PATH floor, not pinned.
  - **Read and query in-process via the bundled `duckdb` crate.** Fast iterative
    queries — natural for relate — and a deterministic engine version pinned via
    Cargo.lock. Diverges from both siblings and adds the libduckdb compile.

  ## Decision Outcome

  Chosen option: **read and query DuckDB in-process via the bundled `duckdb`
  crate.** dovetail is a discovery/modelling tool, not an ingestion CLI or a
  pipeline engine — it fires many small read queries during relate's discovery,
  where in-process access is the right shape and per-query subprocess spawn is not.

  The load-bearing distinction that keeps this clean: **dovetail reads and queries
  in-process, but it emits execution artifacts (SQL, YAML) to file.** It never runs
  those artifacts — the user (or arcform) does. So the in-process DuckDB is for
  *discovery reads only*; the *execution* path is always a written artifact. This
  preserves choice 0001 (dovetail decides; arcform and DuckDB execute):
  querying-for-discovery is not running a pipeline.

  dovetail is a little different from its siblings here, deliberately so.

  ### Consequences

  - Good, because relate's many small overlap/cardinality/verification queries run
    cheaply in-process rather than as subprocess round-trips
  - Good, because the engine version is pinned via Cargo.lock (deterministic
    discovery), not a PATH floor
  - Good, because the read/emit split keeps choice 0001 intact — execution is always
    a file artifact the user runs, never something dovetail runs
  - Bad, because it diverges from finetype (choice 0100) and arcform (decision 0003),
    both of which shell out — dovetail is the meridian odd-one-out by design
  - Bad, because the bundled `duckdb` crate adds a heavy libduckdb compile and a
    larger binary
  - Neutral, because duckdb-on-PATH is already a de-facto execution requirement (the
    user runs dovetail's emitted `.sql` with their own DuckDB) — embedding only
    concerns dovetail's own discovery reads
