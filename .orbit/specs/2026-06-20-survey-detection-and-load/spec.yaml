id: 2026-06-20-survey-detection-and-load
goal: |
  dovetail survey on the SQL-native format set (CSV, TSV, Parquet, NDJSON,
  top-level JSON) emits, per file, a datapackage.json resource plus a standalone
  .sql load that DuckDB runs unattended, and reports that it took the SQL rung.

  ## What good looks like
  An analyst points survey at a pile of unfamiliar SQL-native files and gets back
  a recipe they can read and trust, not a black box. The make-or-break is
  detection: if survey reads the row-level structure wrong, the recipe loads the
  wrong table and the analyst does the work by hand. So this spec leads with a
  detection spike, picks the winner on measured numbers, then builds survey on it.

  ## Sequencing (spike -> build, one drive, two phases)
  Phase A evaluates >=2 detection algorithms on a fixture corpus and picks the
  winner. Phase B builds emission on the winner. Phase B's accuracy gate (ac-10)
  is the kill-condition guard: below the bar, survey routes to suggest-and-confirm
  rather than emit-and-trust.

  ## Constraints
  - survey EMITS, it does not execute. DuckDB runs only in the test round-trip,
    never as survey's load path (keeps choice 0001 clean; choice 0009 stays open).
  - finetype is an in-process LIBRARY DEPENDENCY of dovetail-core, used recursively
    for column profiling and for each resource's Table Schema (resolves choice 0012).
  - SQL-native formats only; jaq escalation, calcard, calamine are out of scope.
  - The emitted descriptor is conformant Frictionless Data Package (choice 0002);
    foreignKeys are out of scope here (they belong to relate, card 0002).
cards:
- 0001-survey
status: closed
labels:
- survey
- detection
- finetype
- sql-load
- mvp
acceptance_criteria:
- id: ac-01
  description: |
    FIXTURE CORPUS. Assemble a curated set of SQL-native inputs (CSV, TSV, Parquet,
    NDJSON, top-level JSON), each paired with an expected manifest: row-level
    structure, row count, and column set. Includes the awkward-but-in-scope cases —
    a CSV with duplicate column names, a JSON file that is an array of flat records,
    a JSON file with a single top-level object. DELIVERABLE: the corpus + manifests
    under a test fixtures tree. verifies: capability.
  gate: false
  checked: true
- id: ac-02
  description: |
    DETECTOR TRAIT + >=2 IMPLEMENTATIONS. Define `Detector` in dovetail-core
    returning a detected Structure for a sampled input. Ship two implementations:
    (a) a finetype-guided recursive descent — profile candidate rows, and when a
    column profiles as records (a hidden table) descend and re-profile; (b) a
    structure shape-heuristic with no finetype, for the head-to-head. verifies:
    capability.
  gate: false
  checked: true
- id: ac-03
  description: |
    EVAL HARNESS. Run each Detector over the fixture corpus and report a
    row-structure identification hit-rate per detector (correct structure / total
    fixtures), with a per-fixture breakdown so misses are inspectable. DELIVERABLE:
    a reproducible eval run + its results table. verifies: capability.
  gate: false
  checked: true
- id: ac-04
  description: |
    PICK + JUSTIFY THE WINNER. From ac-03's numbers, choose the detector survey
    will build on and record the choice with the hit-rates that justify it and the
    bar it must clear in ac-10. DELIVERABLE: a short decision note in the spec
    folder. verifies: capability.
  gate: true
  checked: true
  ac_type: doc
- id: ac-05
  description: |
    SQL EMISSION. For each supported input, dovetail-core emits a standalone .sql
    that loads it via DuckDB natively (read_csv / read_json / read_parquet with the
    parameters the chosen detector resolved), using the standard Table Dialect
    fields where they apply. The emitted SQL is plain and reviewable, not clever —
    legibility is the output value. verifies: capability.
  gate: false
  checked: true
- id: ac-06
  description: |
    DATA PACKAGE ASSEMBLY. survey emits a datapackage.json per surveyed file with
    source path, detected format, the load recipe (or a reference to the emitted
    .sql), and the per-resource Table Schema produced by finetype. Resource-level
    provenance rides the standard fields (hash, bytes, format, created). verifies:
    capability.
  gate: false
  checked: true
- id: ac-07
  description: |
    ROUND-TRIP. In the test suite, the emitted .sql runs against DuckDB and yields a
    table whose row count and column set match the fixture's expected manifest.
    DuckDB runs only here, in tests — never as survey's own load path. A mismatch
    fails the test loudly (it is the core failure mode). verifies: capability.
  gate: true
  checked: true
- id: ac-08
  description: |
    DESCRIPTOR CONFORMANCE. Every emitted datapackage.json validates against the
    vendored Frictionless profiles (datapackage / dataresource / tableschema) in the
    test suite. Custom properties (the load recipe) are present without breaking
    conformance. verifies: capability.
  gate: false
  checked: true
- id: ac-09
  description: |
    RUNG REPORTING. For every input, survey prints which rung it chose (SQL here)
    and why, so the analyst sees the path taken. verifies: capability.
  gate: false
  checked: true
- id: ac-10
  description: |
    DETECTION-QUALITY GATE (kill-condition guard). On the fixture corpus, the chosen
    detector's correct row-structure rate is >= 90%. Below the bar, survey routes
    the under-confident input to suggest-and-confirm (surface the file and what the
    detector saw, propose a recipe for the analyst to confirm) rather than emit-and-
    trust. This is the operational form of the primary kill condition. verifies:
    capability.
  gate: true
  checked: true
- id: ac-11
  description: |
    DUPLICATE-KEY / DUPLICATE-COLUMN POLICY SURFACED. When an input carries duplicate
    column names or keys, survey surfaces the duplication and records an explicit
    policy (keep-last, keep-first, collect-to-array, or rename) rather than letting a
    parser silently drop data. verifies: capability.
  gate: false
  checked: true
