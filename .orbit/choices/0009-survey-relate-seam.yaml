body: |
  # 0009. The survey-to-relate seam — who runs the load

  ## Context and Problem Statement

  relate needs data in DuckDB, but survey only emits a recipe — it loads nothing. So there is a gap between the two verbs: something must run survey's emitted load before relate can read tables. Any resolution must respect choice 0001 (dovetail does not execute pipelines), so it must not turn dovetail into a pipeline engine.

  ## Considered Options

  - **relate runs survey's emitted SQL against a scratch DuckDB.** A convenience for local exploration; dovetail executes its *own* emitted output, not a competing pipeline. Risk: it grows an execution surface that edges toward choice 0001.
  - **The analyst always runs the load step themselves between survey and relate.** Keeps choice 0001 pristine; costs a manual step and a documented handoff.

  ## Decision Outcome

  Chosen option: **the analyst runs the load step; relate reads an existing DuckDB.** The analyst runs survey's emitted `.sql` (with their own DuckDB) to load the tables, then points `dovetail relate` at that database. relate issues only read queries — schema introspection, value-overlap/cardinality evidence, and referential-integrity verification. dovetail runs no load step. Decided in tabletop 2026-06-21-relate-discover-verify-render.

  This keeps choice 0001 (dovetail decides; arcform and DuckDB execute) pristine: dovetail never executes a load. It is consistent with choice 0014 (read/query DuckDB in-process via the crate, but emit execution artifacts to file) — relate's in-process reads are discovery, not pipeline execution. The scratch-DuckDB-runner option is held in reserve (a fallback if the two-step workflow proves too clunky in practice), not adopted.

  The interaction with choice 0012 (finetype as a library dependency) is resolved cleanly: finetype-as-library is for *detection/typing*, and relate's DuckDB access is *read-only discovery* — neither makes dovetail a pipeline executor.

  ### Consequences

  - Good, because choice 0001 stays intact — dovetail emits and reads, never runs a load
  - Good, because the seam is a simple, documented handoff (run the emitted `.sql`, then relate)
  - Bad, because there is a manual step between survey and relate — mitigated by survey's `.sql` being a one-liner to run
  - Neutral, because the scratch-DuckDB convenience runner remains available as a later opt-in if the handoff proves clunky
