id: '0012'
title: finetype as an in-process library dependency of dovetail-core
status: accepted
date_created: 2026-06-20
date_modified: 2026-06-20
body: |
  # 0012. finetype integration — library dependency or upstream artifact

  ## Context and Problem Statement

  relate uses finetype semantic-type agreement as relationship evidence, and survey describes resources with a Table Schema and types. So dovetail depends on finetype's output somehow. Whether that is a library dependency of `dovetail-core` or an upstream artefact the tools consume shapes the dependency graph and whether the tools are usable independently.

  ## Considered Options

  - **finetype as a library dependency of `dovetail-core`.** Tight integration; semantic typing available in-process; couples the two crates' versions.
  - **finetype as an upstream artefact that survey and relate consume.** Looser coupling; dovetail reads finetype's emitted profiles / types; the tools stay usable independently.

  ## Decision Outcome

  Chosen option: **finetype as a library dependency of `dovetail-core`**. survey's detection engine calls finetype in-process — recursively profiling candidate rows to find the row-level structure (a column that profiles as records is a hidden table; descend and re-profile) and producing each resource's Table Schema. Detection sits behind a pluggable `Detector` trait, with the finetype-guided recursive descent as the first implementation, so alternative algorithms can be evaluated head-to-head without changing the dependency. Decided in tabletop 2026-06-20-survey-detection-and-load.

  This does not breach choice 0001: an in-process library dependency for *detection* is independent of *executing a load*. survey still emits recipes and runs nothing; DuckDB executes only in the test round-trip. The survey-relate seam (choice 0009) stays open and is not forced either way by this decision.

  ### Consequences

  - Good, because detection — the make-or-break capability — gets finetype's semantic typing in-process, cheaply enough to recurse over nested structure
  - Good, because each emitted resource's Table Schema comes from finetype rather than a second-rate reimplementation
  - Good, because the `Detector` trait keeps the integration swappable: finetype is the strong default without foreclosing other algorithms
  - Bad, because `dovetail-core` and finetype versions are now coupled; a finetype change can ripple into dovetail
  - Neutral, because relate's use of finetype semantic-type agreement (card 0002-relate) rides the same dependency
