id: 0001-survey
feature: Survey unfamiliar data into runnable load recipes
as_a: data analyst
i_want: to point dovetail at a pile of unfamiliar files and get a clean, runnable recipe for landing each one into DuckDB
so_that: I can ingest awkward inputs deterministically without hand-writing loaders or guessing at their structure
goal: every supported input yields a Data Package descriptor plus an executable load (standalone .sql where possible, arcform .yaml otherwise), with the chosen path reported and why
maturity: planned
scenarios:
- name: Land a CSV via the native SQL path
  given: a plain CSV file
  when: I run dovetail survey on it
  then: dovetail emits a standalone .sql that reads it with DuckDB natively, and reports it took the SQL rung
  gate: false
- name: Hoist rows from a nested JSON array
  given: a JSON file whose records sit under a key rather than at the top level
  when: I run dovetail survey on it
  then: dovetail emits an arcform .yaml that hoists the rows with jaq to NDJSON then loads them, and reports why the SQL rung was unavailable
  gate: false
- name: Handle an oversized JSON object
  given: a JSON file larger than DuckDB's maximum_object_size default
  when: I run dovetail survey on it
  then: the recipe either converts it to newline-delimited JSON or raises the limit, and the choice is recorded
  gate: false
- name: Surface duplicate keys with an explicit policy
  given: an input where a parser would silently keep the last value for duplicate keys
  when: I run dovetail survey on it
  then: dovetail surfaces the duplication and makes the policy explicit (keep-last, keep-first, collect-to-array, or rename)
  gate: false
- name: Emit a Data Package descriptor per resource
  given: one or more surveyed files
  when: survey completes
  then: a datapackage.json describes each resource with its source path, detected format, load recipe, and Table Schema
  gate: false
specs:
- .orbit/specs/2026-06-20-survey-detection-and-load/spec.yaml
relations: []
