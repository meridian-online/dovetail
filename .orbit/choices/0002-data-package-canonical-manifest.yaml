title: Frictionless Data Package as the canonical manifest
status: accepted
date_created: 2026-06-20
date_modified: 2026-06-20
body: |
  # 0002. Frictionless Data Package as the canonical manifest

  ## Context and Problem Statement

  dovetail builds two models — a load model and a relationship model — and must serialise them. It could invent a bespoke manifest pairing a per-table contract format with a separate relationship format, or adopt an existing standard that already expresses both.

  ## Considered Options

  - **Bespoke two-format manifest.** One format for per-resource load recipes and table shape, another for relationships. Full control, but two formats to design, document, and maintain.
  - **Frictionless Data Package.** A single `datapackage.json` carrying each resource's load recipe and Table Schema, plus cross-resource `foreignKeys`. Published as JSON Schema, interoperable with existing tooling.

  ## Decision Outcome

  Chosen option: **Frictionless Data Package** as the single canonical artefact, the spine that ties survey and relate together. Per-resource shape is plain JSON Schema (the Data Package specs are themselves published as JSON Schema); relationships ride as `foreignKeys` entries with dovetail's evidence, confidence and status as custom properties. One standard, interoperable file rather than two formats we maintain ourselves.

  ### Consequences

  - Good, because per-table contracts and cross-table relationships live in one standard file
  - Good, because JSON Schema validates table shape while `foreignKeys` carries the relational structure JSON Schema cannot express on its own
  - Good, because it is interoperable with the wider Frictionless tooling ecosystem
  - Bad, because the custom properties (evidence, confidence, status) extend the spec; consumers that ignore extensions see only the standard core
