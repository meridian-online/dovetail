acceptance_criteria:
- id: ac-01
  description: |
    FIXTURE DUCKDB. A multi-table DuckDB fixture with four known cases: (a) a
    holding FK (e.g. orders.customer_id ⊆ customers.id, zero orphans, parent
    unique) that MUST auto-accept; (b) a near-miss with orphan rows that must NOT
    accept; (c) a coincidental low-cardinality overlap (e.g. two boolean/flag
    columns) that must NOT accept; (d) an ambiguous mid-confidence edge that must
    surface as suggested. DELIVERABLE: the fixture DB (built reproducibly) + a
    manifest of expected outcomes. verifies: capability.
  gate: false
  checked: true
- id: ac-02
  description: |
    SCHEMA READ + CANDIDATE GENERATION. relate connects to a DuckDB, reads table
    and column schemas, and generates candidate edges scored with the core
    evidence signals: value overlap, cardinality, and name similarity. Pairwise
    work is pruned (by type/name) before the expensive overlap query. verifies:
    capability.
  gate: false
  checked: true
- id: ac-03
  description: |
    VERIFICATION (gate). For each candidate, relate verifies referential
    integrity against the FULL data: the child values must be a subset of the
    parent values (orphan-row count == 0), AND the parent side must be unique /
    PK-like (a real FK references a key). Both conditions are required — orphan-
    free alone is insufficient (the boolean-vs-boolean trap). This gate is the
    safety rail that makes auto-accept sound. verifies: capability.
  gate: true
  checked: true
- id: ac-04
  description: |
    STATUS ASSIGNMENT (auto-accept). Each edge is assigned status from
    verification + confidence: verified AND high-confidence → accepted (no analyst
    action); verification failed → rejected; plausible but unverified / ambiguous
    → suggested. The holding-FK fixture auto-accepts; the orphan near-miss and the
    coincidental boolean overlap do NOT; the ambiguous edge becomes suggested.
    verifies: capability.
  gate: false
  checked: true
- id: ac-05
  description: |
    FOREIGNKEYS WRITTEN TO THE DESCRIPTOR. Discovered edges are written as
    Frictionless foreignKeys INSIDE the relevant resource's Table Schema, shaped
    {fields, reference:{resource, fields}}, each carrying dovetail's evidence,
    confidence and status as custom properties (choice 0003). The descriptor still
    validates against the vendored Frictionless profile. verifies: capability.
  gate: false
  checked: true
- id: ac-06
  description: |
    CONSTRAINT DDL FOR ACCEPTED EDGES ONLY. relate compiles accepted edges to
    PK/FK constraint DDL; suggested and rejected edges do NOT compile (choice
    0007). The emitted DDL is plain and reviewable. In the test suite the DDL
    applies cleanly against the fixture DuckDB (the constraint provably holds,
    since the edge was verified). verifies: capability.
  gate: false
  checked: true
- id: ac-07
  description: |
    dovetail relate CLI. The thin bin gains a relate subcommand that connects to a
    DuckDB, runs discovery + verification, writes/updates the descriptor, and
    reports per-edge status (accepted / suggested / rejected) with a one-line
    reason so the analyst sees what was decided and why — surfacing only the
    uncertain band as needing a look. verifies: capability.
  gate: false
  checked: true
