id: 0002-relate
feature: Discover how datasets relate
as_a: data analyst
i_want: dovetail to find candidate joins across my DuckDB tables, verify each against the data, and accept the provable ones automatically
so_that: I get a trustworthy relationship model without adjudicating every column pair — only the genuinely uncertain edges need my eyes
goal: candidate edges recorded as Data Package foreignKeys carrying evidence, confidence and status; verified high-confidence edges auto-accept and compile; only accepted edges ever compile to constraint DDL or join SQL
maturity: planned
scenarios:
- name: Suggest a candidate foreign key with evidence
  given: two loaded DuckDB tables that share a key
  when: I run dovetail relate
  then: a candidate edge is recorded as a foreignKey with its evidence (value overlap, cardinality, name similarity) and a confidence score
  gate: false
- name: Verified edge auto-accepts and compiles, no manual step
  given: a candidate edge whose child values are a subset of a unique/PK-like parent column (referential integrity holds)
  when: dovetail relate verifies it against the data
  then: the edge is auto-assigned status accepted and compiles to PK/FK constraint DDL — no per-edge analyst action required
  gate: false
- name: An unverified edge never compiles
  given: a candidate edge with orphan rows, or a coincidental low-cardinality overlap (e.g. two boolean columns)
  when: dovetail relate verifies it against the data
  then: it is auto-assigned rejected (verification failed) and is never rendered as a constraint or join SQL — no unverified guess becomes a hard constraint
  gate: false
- name: Only the uncertain band is surfaced for review
  given: a plausible but unverified or ambiguous mid-confidence edge
  when: dovetail relate runs
  then: the edge is left status suggested and surfaced to me for an optional look, rather than auto-accepted or silently dropped
  gate: false
- name: Render the accepted model as a graph
  given: a set of accepted edges
  when: I ask for a graph view
  then: dovetail renders a Mermaid erDiagram (or a brightfield feed) for triage
  gate: false
- name: Emit join SQL for accepted edges
  given: accepted edges destined for automation
  when: I render join SQL
  then: dovetail emits join / enrichment SQL for those edges
  gate: false
