body: |
  # 0003. foreignKeys is the canonical relationship model; renders are projections

  ## Context and Problem Statement

  relate discovers candidate joins across DuckDB tables. The discovered relationships need a canonical home, and several downstream consumers want them in different shapes (constraint DDL, a graph view for triage, join SQL for automation). The question is which representation is canonical and which are derived.

  ## Considered Options

  - **A first-class graph format as canonical**, with SQL / DDL as exports off it.
  - **Data Package `foreignKeys` as canonical**, with every render a projection generated on demand.

  ## Decision Outcome

  Chosen option: **`foreignKeys` in the Data Package descriptor is the one canonical relationship model**, modelled directly on SQL foreign keys. Constraint DDL, the Mermaid `erDiagram` / brightfield graph view, and join / enrichment SQL are all projections of it, generated on demand. Each edge carries its evidence (value overlap, cardinality, finetype semantic-type agreement, name similarity), a confidence score, and a status of `suggested`, `accepted` or `rejected`.

  ### Consequences

  - Good, because there is one source of truth — renders never drift from the model
  - Good, because it aligns with choice 0002: relationships live in the same descriptor as the load model
  - Bad, because graph semantics richer than SQL foreign keys must be expressed within `foreignKeys` plus custom properties
  - Neutral, because the exact render set and their flags are still open (choice 0010)
